name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Stage 1: Test & Build Validation ──────────────────────────────
  validate:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race

      - name: Build (sanity check)
        run: go build -o /dev/null ./cmd/routatic-proxy

  # ── Stage 2: Create Release ──────────────────────────────────────
  release:
    name: Create Release
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Determine version
        id: version
        run: |
          # Check if there's a tag on this commit
          EXACT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          if [ -n "$EXACT_TAG" ]; then
            TAG="$EXACT_TAG"
          else
            # Auto-increment with rollover (0-9 per segment)
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            BASE=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -gt 9 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
              if [ "$MINOR" -gt 9 ]; then
                MINOR=0
                MAJOR=$((MAJOR + 1))
              fi
            fi
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Releasing as $TAG"

      - name: Build cross-platform binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist

          LDFLAGS="-X main.version=${VERSION}"

          # Define target platforms
          declare -A TARGETS=(
            ["darwin-amd64"]="darwin/amd64"
            ["darwin-arm64"]="darwin/arm64"
            ["linux-amd64"]="linux/amd64"
            ["linux-arm64"]="linux/arm64"
            ["windows-amd64"]="windows/amd64"
            ["windows-arm64"]="windows/arm64"
          )

          for NAME in "${!TARGETS[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "${TARGETS[$NAME]}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"

            echo "Building ${NAME}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags "$LDFLAGS -s -w" \
                -o "dist/routatic-proxy_${NAME}${EXT}" \
                ./cmd/routatic-proxy
          done

          echo ""
          echo "Built binaries:"
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum routatic-proxy_* > checksums.txt
          cat checksums.txt

      - name: Generate AI Changelog
        id: changelog
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_TEMPERATURE: ${{ secrets.OPENROUTER_TEMPERATURE }}
          OPENROUTER_MAX_TOKENS: ${{ secrets.OPENROUTER_MAX_TOKENS }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq curl

          # Configuration with defaults
          MODEL="${OPENROUTER_MODEL:-openai/gpt-4o-mini}"
          TEMP="${OPENROUTER_TEMPERATURE:-0.3}"
          TOKENS="${OPENROUTER_MAX_TOKENS:-2000}"

          echo "Using OpenRouter model: $MODEL"

          # Generate changelog for commits since previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Generating AI changelog from $PREVIOUS_TAG to ${{ steps.version.outputs.tag }}"

            COMMITS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"%H%n%s%n%b%n---COMMIT_SEP---")
            FILE_CHANGES=$(git diff --stat "${PREVIOUS_TAG}..HEAD")

            PROMPT="You are a technical writer generating release notes for a Go proxy server project (routatic-proxy).

            Analyze the provided git commits and file changes, then generate a well-structured
            changelog in Markdown format. Follow these guidelines:

            1. Start with a brief summary paragraph (2-3 sentences) describing the overall theme of this release
            2. Group changes into sections with these exact headers:
               - **New Features** - New capabilities, enhancements, additions
               - **Bug Fixes** - Fixes for reported or discovered issues
               - **Improvements** - Performance, reliability, or code quality improvements
               - **Documentation** - README, docs, comments, config updates
               - **Chores** - Build, CI/CD, dependency updates, refactoring
            3. Each bullet should be concise but descriptive (one line)
            4. Mention breaking changes prominently with a warning emoji Breaking Changes section at the top
            5. Use present tense, imperative mood (e.g., Add feature not Added feature)
            6. Keep it technical but accessible - target audience is developers using this tool

            Format output as clean Markdown without any preamble or explanation. Do not wrap the entire response in a code block."

            USER_CONTENT="Git commits since ${PREVIOUS_TAG}:\n\n${COMMITS}\n\nFiles changed:\n\n${FILE_CHANGES}"

            # Truncate if too long (~4 chars per token)
            MAX_CHARS=12000
            if [ "${#USER_CONTENT}" -gt "$MAX_CHARS" ]; then
              USER_CONTENT="${USER_CONTENT:0:MAX_CHARS}\n\n[...truncated for length...]"
            fi

            RESPONSE=$(curl -s -L -X POST "https://openrouter.ai/api/v1/chat/completions" \
              -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg prompt "$PROMPT" \
                --arg user "$USER_CONTENT" \
                --arg model "$MODEL" \
                --arg temp "$TEMP" \
                --arg tokens "$TOKENS" \
                '{
                  model: $model,
                  messages: [
                    {role: "system", content: $prompt},
                    {role: "user", content: $user}
                  ],
                  temperature: ($temp | tonumber),
                  max_tokens: ($tokens | tonumber)
                }' \
              )" \
            )

            CHANGELOG=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

            if [ -z "$CHANGELOG" ] || [ "$CHANGELOG" = "null" ]; then
              echo "Warning: AI changelog generation failed, using commit list instead" >&2
              echo "API response: $RESPONSE" >&2
              CHANGELOG="## Commits\n\n$(git log \"${PREVIOUS_TAG}..HEAD\" --pretty=format:'- %s')"
            fi
          else
            echo "No previous tag found, using commit list"
            CHANGELOG="## Commits\n\n$(git log --pretty=format:'- %s' -20)"
          fi

          echo "$CHANGELOG" > changelog.md
          cat changelog.md

      # GITHUB_TOKEN works here — same repo
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: changelog.md
          draft: false
          prerelease: false
          files: |
            dist/routatic-proxy_*
            dist/checksums.txt

  # ── Stage 2.5: Build macOS DMG ──────────────────────────────────
  release-macos:
    name: Build & Release macOS DMG
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS DMG
        env:
          VERSION: ${{ needs.release.outputs.tag }}
        run: |
          make dmg VERSION=${{ env.VERSION }}

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: bin/RoutaticProxy.dmg

  # ── Stage 3: Publish Docker Image ───────────────────────────────
  docker:
    name: Publish Docker Image
    needs: release
    permissions:
      contents: read
      packages: write
    if: github.repository == 'routatic/proxy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.tag }}
            type=raw,value=latest

      - name: Strip v prefix from version
        id: version
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 4: Update Homebrew Tap ─────────────────────────────────
  homebrew:
    name: Update Homebrew Tap
    needs: release
    if: github.repository == 'routatic/proxy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir release-assets \
            --pattern "checksums.txt"

      - name: Extract checksums for Homebrew
        id: checksums
        run: |
          cd release-assets
          DARWIN_ARM64=$(awk '/darwin-arm64$/ {print $1}' checksums.txt)
          DARWIN_AMD64=$(awk '/darwin-amd64$/ {print $1}' checksums.txt)
          LINUX_AMD64=$(awk '/linux-amd64$/ {print $1}' checksums.txt)
          LINUX_ARM64=$(awk '/linux-arm64$/ {print $1}' checksums.txt)

          echo "darwin_arm64=$DARWIN_ARM64" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$DARWIN_AMD64" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$LINUX_AMD64" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$LINUX_ARM64" >> "$GITHUB_OUTPUT"

      # HOMEBREW_PAT needed here — cross-repo operations
      - name: Update homebrew tap
        env:
          PAT: ${{ secrets.HOMEBREW_PAT }}
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.tag }}
          DARWIN_ARM64: ${{ steps.checksums.outputs.darwin_arm64 }}
          DARWIN_AMD64: ${{ steps.checksums.outputs.darwin_amd64 }}
          LINUX_AMD64: ${{ steps.checksums.outputs.linux_amd64 }}
          LINUX_ARM64: ${{ steps.checksums.outputs.linux_arm64 }}
        run: |
          REPO="${{ github.repository }}"
          OWNER="${REPO%%/*}"
          TAP_REPO="${OWNER}/homebrew-tap"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Clone the tap repo (created manually as a public repo)
          git clone "https://x-access-token:${PAT}@github.com/${TAP_REPO}.git" tap-repo
          cd tap-repo

          mkdir -p Formula Aliases

          cat > Formula/routatic-proxy.rb << RUBY
          class RoutaticProxy < Formula
            desc "Proxy Claude Code requests to OpenCode Go API"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/routatic-proxy_darwin-arm64"
                sha256 "${DARWIN_ARM64}"
              else
                url "${BASE_URL}/routatic-proxy_darwin-amd64"
                sha256 "${DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${BASE_URL}/routatic-proxy_linux-amd64"
                sha256 "${LINUX_AMD64}"
              else
                url "${BASE_URL}/routatic-proxy_linux-arm64"
                sha256 "${LINUX_ARM64}"
              end
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "routatic-proxy_darwin-arm64" => "routatic-proxy"
              elsif OS.mac?
                bin.install "routatic-proxy_darwin-amd64" => "routatic-proxy"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install "routatic-proxy_linux-amd64" => "routatic-proxy"
              else
                bin.install "routatic-proxy_linux-arm64" => "routatic-proxy"
              end
              bin.install_symlink bin/"routatic-proxy" => "oc-go-cc"
            end

            def caveats
              <<~EOS
                To get started with routatic-proxy:

                  1. Initialize configuration:
                     routatic-proxy init

                  2. Set your OpenCode Go API key:
                     export ROUTATIC_PROXY_API_KEY=sk-opencode-your-key

                  3. Start the proxy:
                     routatic-proxy serve

                  4. Configure Claude Code:
                     export ANTHROPIC_BASE_URL=http://127.0.0.1:3456
                     export ANTHROPIC_AUTH_TOKEN=unused

                  5. Run Claude Code:
                     claude
              EOS
            end

            test do
              system "#{bin}/routatic-proxy", "--version"
              system "#{bin}/oc-go-cc", "--version"
            end
          end
          RUBY

          ln -sf ../Formula/routatic-proxy.rb Aliases/oc-go-cc

          git add Formula/routatic-proxy.rb Aliases/oc-go-cc
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update routatic-proxy to ${VERSION}" || echo "No changes to commit"
          git push

  # ── Stage 5: Update Scoop Bucket ──────────────────────────────────
  scoop:
    name: Update Scoop Bucket
    needs: release
    if: github.repository == 'routatic/proxy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir release-assets \
            --pattern "checksums.txt"

      - name: Extract checksums for Scoop
        id: checksums
        run: |
          cd release-assets
          WINDOWS_AMD64=$(awk '/windows-amd64/ {print $1}' checksums.txt)
          WINDOWS_ARM64=$(awk '/windows-arm64/ {print $1}' checksums.txt)

          echo "windows_amd64=$WINDOWS_AMD64" >> "$GITHUB_OUTPUT"
          echo "windows_arm64=$WINDOWS_ARM64" >> "$GITHUB_OUTPUT"

      # SCOOP_PAT needed here — cross-repo operations
      - name: Update scoop bucket
        env:
          PAT: ${{ secrets.SCOOP_PAT }}
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.tag }}
          WINDOWS_AMD64: ${{ steps.checksums.outputs.windows_amd64 }}
          WINDOWS_ARM64: ${{ steps.checksums.outputs.windows_arm64 }}
        run: |
          REPO="${{ github.repository }}"
          OWNER="${REPO%%/*}"
          BUCKET_REPO="${OWNER}/scoop-bucket"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Clone the bucket repo (created manually as a public repo)
          git clone "https://x-access-token:${PAT}@github.com/${BUCKET_REPO}.git" bucket-repo
          cd bucket-repo

          mkdir -p bucket

          cat > bucket/routatic-proxy.json << JSON
          {
              "version": "${VERSION}",
              "description": "Proxy Claude Code requests to OpenCode Go API",
              "homepage": "https://github.com/${REPO}",
              "license": "AGPL-3.0-only",
              "architecture": {
                  "64bit": {
                      "url": "${BASE_URL}/routatic-proxy_windows-amd64.exe",
                      "hash": "${WINDOWS_AMD64}"
                  },
                  "arm64": {
                      "url": "${BASE_URL}/routatic-proxy_windows-arm64.exe",
                      "hash": "${WINDOWS_ARM64}"
                  }
              },
              "bin": [
                  ["routatic-proxy.exe", "routatic-proxy"],
                  ["routatic-proxy.exe", "oc-go-cc"]
              ],
              "post_install": "Get-ChildItem \$dir\\\\routatic-proxy_windows-*.exe | Rename-Item -NewName routatic-proxy.exe",
              "checkver": {
                  "github": "https://github.com/${REPO}"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/${REPO}/releases/download/v\$version/routatic-proxy_windows-amd64.exe"
                      },
                      "arm64": {
                          "url": "https://github.com/${REPO}/releases/download/v\$version/routatic-proxy_windows-arm64.exe"
                      }
                  }
              }
          }
          JSON

          cp bucket/routatic-proxy.json bucket/oc-go-cc.json

          git add bucket/routatic-proxy.json bucket/oc-go-cc.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update routatic-proxy to ${VERSION}" || echo "No changes to commit"
          git push
